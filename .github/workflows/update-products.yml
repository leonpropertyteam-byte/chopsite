name: Daily Product Update

on:
  schedule:
    - cron: '0 6 * * *'   # Runs every day at 08:00 SAST (06:00 UTC)
  workflow_dispatch:      # Allows manual trigger

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_products.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chop_search_daily_update.csv
          git commit -m "Auto-update product prices" || echo "No changes to commit"
          git push
